<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LineChart Dev Harness</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #f9fafb; color: #111827; padding: 24px; }
      h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 16px; }
      .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
      button {
        padding: 6px 14px; border-radius: 6px; border: 1px solid #d1d5db;
        background: #fff; cursor: pointer; font-size: 13px;
      }
      button:hover { background: #f3f4f6; }
      #chart-container { width: 100%; height: 400px; background: #fff; border-radius: 10px; border: 1px solid #e5e7eb; }
      #log { margin-top: 16px; font-size: 12px; color: #6b7280; }
      .section-label { font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; width: 100%; margin-top: 4px; }
      .control-group { display: flex; align-items: center; gap: 6px; }
      .control-group label { font-size: 12px; color: #374151; white-space: nowrap; }
      .btn-group { display: flex; border-radius: 6px; border: 1px solid #d1d5db; overflow: hidden; }
      .btn-group button { border-radius: 0; border: none; border-right: 1px solid #e5e7eb; }
      .btn-group button:last-child { border-right: none; }
      button.active { background: #f0fdf4; color: #16a34a; }
      button.danger { border-color: #fca5a5; color: #dc2626; }
      button.danger:hover { background: #fef2f2; }
      select, input[type="number"], input[type="text"] {
        padding: 5px 8px; border-radius: 6px; border: 1px solid #d1d5db;
        background: #fff; font-size: 12px; color: #111827;
      }
      input[type="number"] { width: 72px; }
      input[type="text"] { width: 100px; }
      input[type="color"] { padding: 2px 4px; height: 28px; border-radius: 6px; border: 1px solid #d1d5db; cursor: pointer; }
    </style>
  </head>
  <body>
    <h1>LineChart Dev Harness</h1>
    <div class="controls">
      <span class="section-label">Actions</span>
      <button id="btn-red">Red line</button>
      <button id="btn-blue">Blue line</button>
      <div class="btn-group">
        <button id="btn-append">Append 1 point</button>
        <button id="btn-auto-append">Auto</button>
      </div>
      <button id="btn-append-batch">Append 5 points</button>
      <button id="btn-update">Simulate live window</button>
      <button id="btn-clear">Clear</button>
      <button id="btn-reload">Reload data</button>
      <button id="btn-no-dots">Toggle dots</button>
      <button id="btn-toggle-grid">Toggle grid</button>
      <div class="control-group">
        <label for="grid-color">Grid color</label>
        <input type="color" id="grid-color" value="#e5e7eb" />
      </div>

      <span class="section-label">Rolling window</span>
      <div class="control-group">
        <label for="max-data-points">Max points</label>
        <input type="number" id="max-data-points" value="60" min="1" step="1" />
      </div>
      <span class="section-label">Line</span>
      <div class="control-group">
        <label for="curve-type">Curve</label>
        <select id="curve-type">
          <option value="linear">linear</option>
          <option value="monotoneX" selected>monotoneX</option>
          <option value="monotoneY">monotoneY</option>
          <option value="natural">natural</option>
          <option value="basis">basis</option>
          <option value="cardinal">cardinal</option>
          <option value="catmullRom">catmullRom</option>
          <option value="step">step</option>
          <option value="stepBefore">stepBefore</option>
          <option value="stepAfter">stepAfter</option>
        </select>
      </div>

      <span class="section-label">Animation</span>
      <div class="control-group">
        <label for="anim-duration">Duration (ms)</label>
        <input type="number" id="anim-duration" value="750" min="0" step="50" />
      </div>
      <div class="control-group">
        <label for="anim-set-data">setData</label>
        <select id="anim-set-data">
          <option value="drawOn" selected>drawOn</option>
          <option value="transition">transition</option>
          <option value="morph">morph</option>
          <option value="none">none</option>
        </select>
      </div>
      <div class="control-group">
        <label for="anim-update-data">updateData</label>
        <select id="anim-update-data">
          <option value="drawOn">drawOn</option>
          <option value="transition">transition</option>
          <option value="morph" selected>morph</option>
          <option value="none">none</option>
        </select>
      </div>
      <div class="control-group">
        <label for="anim-append">append</label>
        <select id="anim-append">
          <option value="drawOn">drawOn</option>
          <option value="transition">transition</option>
          <option value="morph">morph</option>
          <option value="transition" selected>transition</option>
          <option value="none">none</option>
        </select>
      </div>
      <div class="control-group">
        <label for="anim-easing">Easing</label>
        <select id="anim-easing">
          <option value="easeLinear">easeLinear</option>
          <option value="easeQuadIn">easeQuadIn</option>
          <option value="easeQuadOut">easeQuadOut</option>
          <option value="easeQuadInOut">easeQuadInOut</option>
          <option value="easeCubicIn">easeCubicIn</option>
          <option value="easeCubicOut">easeCubicOut</option>
          <option value="easeCubicInOut" selected>easeCubicInOut</option>
          <option value="easeSinIn">easeSinIn</option>
          <option value="easeSinOut">easeSinOut</option>
          <option value="easeSinInOut">easeSinInOut</option>
          <option value="easeExpIn">easeExpIn</option>
          <option value="easeExpOut">easeExpOut</option>
          <option value="easeExpInOut">easeExpInOut</option>
          <option value="easeCircleIn">easeCircleIn</option>
          <option value="easeCircleOut">easeCircleOut</option>
          <option value="easeCircleInOut">easeCircleInOut</option>
          <option value="easeBackIn">easeBackIn</option>
          <option value="easeBackOut">easeBackOut</option>
          <option value="easeBackInOut">easeBackInOut</option>
          <option value="easeBounceIn">easeBounceIn</option>
          <option value="easeBounceOut">easeBounceOut</option>
          <option value="easeBounceInOut">easeBounceInOut</option>
          <option value="easeElasticIn">easeElasticIn</option>
          <option value="easeElasticOut">easeElasticOut</option>
          <option value="easeElasticInOut">easeElasticInOut</option>
        </select>
      </div>
      <span class="section-label">Series</span>
      <div class="control-group">
        <label for="series-select">Active</label>
        <select id="series-select"><option value="default">default</option></select>
      </div>
      <button id="btn-add-series">Add series</button>
      <button id="btn-remove-series" class="danger">Remove series</button>
      <button id="btn-series-load">Load data</button>
      <div class="btn-group">
        <button id="btn-series-append">Append 1</button>
        <button id="btn-series-auto-append">Auto</button>
      </div>
      <div class="control-group">
        <label for="series-color">Color</label>
        <input type="color" id="series-color" value="#4f46e5" />
      </div>
      <div class="control-group">
        <label for="series-weight">Weight</label>
        <input type="number" id="series-weight" value="2" min="0.5" max="10" step="0.5" />
      </div>
      <button id="btn-load-multi">Load all (Record)</button>

      <span class="section-label">Axes</span>
      <div class="control-group">
        <label for="axis-select">Axis</label>
        <select id="axis-select"><option value="default">default</option></select>
      </div>
      <div class="control-group">
        <label for="axis-name">Name</label>
        <input type="text" id="axis-name" value="default" />
      </div>
      <div class="control-group">
        <label for="axis-color">Color</label>
        <input type="color" id="axis-color" value="#4f46e5" />
      </div>
      <div class="control-group">
        <label><input type="checkbox" id="axis-use-range" /> range</label>
        <input type="number" id="axis-range-min" placeholder="min" step="1" />
        <input type="number" id="axis-range-max" placeholder="max" step="1" />
      </div>
      <div class="control-group">
        <label><input type="checkbox" id="axis-use-limits" /> limits</label>
        <input type="number" id="axis-limits-min" placeholder="min" step="1" />
        <input type="number" id="axis-limits-max" placeholder="max" step="1" />
      </div>
      <button id="btn-create-axis">Create / Update axis</button>
      <button id="btn-remove-axis" class="danger">Remove axis</button>
      <button id="btn-associate-series">Associate active series</button>

      <span class="section-label">Decimation</span>
      <div class="control-group">
        <label for="decimation-threshold">Threshold</label>
        <input type="range" id="decimation-threshold" min="0" max="500" step="1" value="0" style="width:140px" />
        <span id="decimation-display" style="font-size:12px;color:#374151;min-width:28px">off</span>
      </div>

      <span class="section-label">Labels</span>
      <div class="control-group">
        <label for="chart-title">Title</label>
        <input type="text" id="chart-title" placeholder="Chart title" style="width:160px" />
      </div>
      <div class="control-group">
        <label for="x-label">X axis</label>
        <input type="text" id="x-label" placeholder="X-axis label" />
      </div>
      <div class="control-group">
        <label for="y-label">Y axis</label>
        <input type="text" id="y-label" placeholder="Y-axis label" />
      </div>
    </div>
    <div id="chart-container"></div>
    <div id="log">Loading data in 1.5s…</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
