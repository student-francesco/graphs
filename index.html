<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LineChart Dev Harness</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #f9fafb; color: #111827; padding: 24px; }

      /* ── header ──────────────────────────────────────────── */
      .harness-header {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 12px 16px;
        margin-bottom: 12px;
      }
      .header-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }
      h1 { font-size: 1.25rem; font-weight: 600; }
      .controls-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
      .vr { width: 1px; height: 24px; background: #e5e7eb; flex-shrink: 0; }

      /* ── tabs ────────────────────────────────────────────── */
      .tabs-container { margin-bottom: 16px; }
      .tab-list {
        display: flex;
        gap: 2px;
        border-bottom: 1px solid #e5e7eb;
      }
      .tab-btn {
        padding: 6px 14px;
        border: 1px solid transparent;
        border-bottom: none;
        background: transparent;
        cursor: pointer;
        font-size: 13px;
        color: #6b7280;
        border-radius: 6px 6px 0 0;
        position: relative;
        top: 1px;
      }
      .tab-btn:hover { background: #f3f4f6; color: #111827; }
      .tab-btn.active {
        background: #fff;
        color: #111827;
        font-weight: 500;
        border-color: #e5e7eb;
        border-bottom-color: #fff;
      }
      .tab-panel {
        display: none;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-top: none;
        border-radius: 0 0 8px 8px;
        padding: 12px 16px;
      }
      .tab-panel.active { display: flex; }

      /* ── shared controls ─────────────────────────────────── */
      .section-label {
        font-size: 11px; font-weight: 600; color: #6b7280;
        text-transform: uppercase; letter-spacing: 0.05em;
        width: 100%; margin-top: 4px;
      }
      .section-label:first-child { margin-top: 0; }
      .control-group { display: flex; align-items: center; gap: 6px; }
      .control-group label { font-size: 12px; color: #374151; white-space: nowrap; }

      button {
        padding: 6px 14px; border-radius: 6px; border: 1px solid #d1d5db;
        background: #fff; cursor: pointer; font-size: 13px;
      }
      button:hover { background: #f3f4f6; }
      .btn-group { display: flex; border-radius: 6px; border: 1px solid #d1d5db; overflow: hidden; }
      .btn-group button { border-radius: 0; border: none; border-right: 1px solid #e5e7eb; }
      .btn-group button:last-child { border-right: none; }
      button.active { background: #f0fdf4; color: #16a34a; }
      button.danger { border-color: #fca5a5; color: #dc2626; }
      button.danger:hover { background: #fef2f2; }

      select, input[type="number"], input[type="text"] {
        padding: 5px 8px; border-radius: 6px; border: 1px solid #d1d5db;
        background: #fff; font-size: 12px; color: #111827;
      }
      input[type="number"] { width: 72px; }
      input[type="text"]   { width: 100px; }
      input[type="color"]  { padding: 2px 4px; height: 28px; border-radius: 6px; border: 1px solid #d1d5db; cursor: pointer; }

      /* ── chart + log ─────────────────────────────────────── */
      #chart-container { width: 100%; height: 400px; background: #fff; border-radius: 10px; border: 1px solid #e5e7eb; }
      #log { margin-top: 16px; font-size: 12px; color: #6b7280; }
    </style>
  </head>
  <body>

    <!-- ── HEADER — always-visible controls ───────────────────── -->
    <div class="harness-header">
      <div class="header-top">
        <h1>LineChart Dev Harness</h1>
        <button id="btn-save-pdf">Save PDF</button>
      </div>
      <div class="controls-row">
        <!-- quick color picks -->
        <button id="btn-red">Red line</button>
        <button id="btn-blue">Blue line</button>
        <div class="vr"></div>
        <!-- data append / mutate -->
        <div class="btn-group">
          <button id="btn-append">Append 1 point</button>
          <button id="btn-auto-append">Auto</button>
        </div>
        <button id="btn-append-batch">Append 5 points</button>
        <button id="btn-update">Simulate live window</button>
        <button id="btn-clear">Clear</button>
        <button id="btn-reload">Reload data</button>
        <div class="vr"></div>
        <!-- quick visual toggles -->
        <button id="btn-no-dots">Toggle dots</button>
        <button id="btn-toggle-grid">Toggle grid</button>
        <div class="control-group">
          <label for="grid-color">Grid color</label>
          <input type="color" id="grid-color" value="#e5e7eb" />
        </div>
        <div class="vr"></div>
        <!-- rolling window -->
        <div class="control-group">
          <label for="max-data-points">Max points</label>
          <input type="number" id="max-data-points" value="60" min="1" step="1" />
        </div>
        <div class="vr"></div>
        <!-- pan / zoom (handled entirely by d3 inside the library) -->
        <div class="control-group">
          <label for="zoom-mode">Zoom</label>
          <select id="zoom-mode">
            <option value="off">off</option>
            <option value="x" selected>x</option>
            <option value="y">y</option>
            <option value="xy">xy</option>
          </select>
        </div>
        <button id="btn-reset-zoom">Reset zoom</button>
      </div>
    </div>

    <!-- ── TABS ───────────────────────────────────────────────── -->
    <div class="tabs-container">
      <div class="tab-list" role="tablist">
        <button class="tab-btn active" data-tab="line">Line</button>
        <button class="tab-btn" data-tab="animation">Animation</button>
        <button class="tab-btn" data-tab="series">Series</button>
        <button class="tab-btn" data-tab="axes">Axes</button>
        <button class="tab-btn" data-tab="labels">Labels</button>
        <button class="tab-btn" data-tab="annotations">Annotations</button>
      </div>

      <!-- Line tab: curve, smoothing, decimation, scale -->
      <div class="tab-panel active" id="tab-line" role="tabpanel">
        <div class="control-group">
          <label for="curve-type">Curve</label>
          <select id="curve-type">
            <option value="linear">linear</option>
            <option value="monotoneX" selected>monotoneX</option>
            <option value="monotoneY">monotoneY</option>
            <option value="natural">natural</option>
            <option value="basis">basis</option>
            <option value="cardinal">cardinal</option>
            <option value="catmullRom">catmullRom</option>
            <option value="step">step</option>
            <option value="stepBefore">stepBefore</option>
            <option value="stepAfter">stepAfter</option>
          </select>
        </div>
        <div class="vr"></div>
        <div class="control-group">
          <label for="smoothing-window">Smoothing</label>
          <input type="range" id="smoothing-window" min="0" max="50" step="1" value="0" style="width:140px" />
          <span id="smoothing-display" style="font-size:12px;color:#374151;min-width:28px">off</span>
        </div>
        <div class="vr"></div>
        <div class="control-group">
          <label for="decimation-threshold">Decimation</label>
          <input type="range" id="decimation-threshold" min="0" max="500" step="1" value="0" style="width:140px" />
          <span id="decimation-display" style="font-size:12px;color:#374151;min-width:28px">off</span>
        </div>
        <div class="vr"></div>
        <button id="btn-y-scale-toggle">Y scale: linear</button>
        <button id="btn-load-exp">Load exponential data</button>
      </div>

      <!-- Animation tab -->
      <div class="tab-panel" id="tab-animation" role="tabpanel">
        <div class="control-group">
          <label for="anim-duration">Duration (ms)</label>
          <input type="number" id="anim-duration" value="750" min="0" step="50" />
        </div>
        <div class="control-group">
          <label for="anim-set-data">setData</label>
          <select id="anim-set-data">
            <option value="drawOn" selected>drawOn</option>
            <option value="transition">transition</option>
            <option value="morph">morph</option>
            <option value="none">none</option>
          </select>
        </div>
        <div class="control-group">
          <label for="anim-update-data">updateData</label>
          <select id="anim-update-data">
            <option value="drawOn">drawOn</option>
            <option value="transition">transition</option>
            <option value="morph" selected>morph</option>
            <option value="none">none</option>
          </select>
        </div>
        <div class="control-group">
          <label for="anim-append">append</label>
          <select id="anim-append">
            <option value="drawOn">drawOn</option>
            <option value="transition" selected>transition</option>
            <option value="morph">morph</option>
            <option value="none">none</option>
          </select>
        </div>
        <div class="control-group">
          <label for="anim-easing">Easing</label>
          <select id="anim-easing">
            <option value="easeLinear">easeLinear</option>
            <option value="easeQuadIn">easeQuadIn</option>
            <option value="easeQuadOut">easeQuadOut</option>
            <option value="easeQuadInOut">easeQuadInOut</option>
            <option value="easeCubicIn">easeCubicIn</option>
            <option value="easeCubicOut">easeCubicOut</option>
            <option value="easeCubicInOut" selected>easeCubicInOut</option>
            <option value="easeSinIn">easeSinIn</option>
            <option value="easeSinOut">easeSinOut</option>
            <option value="easeSinInOut">easeSinInOut</option>
            <option value="easeExpIn">easeExpIn</option>
            <option value="easeExpOut">easeExpOut</option>
            <option value="easeExpInOut">easeExpInOut</option>
            <option value="easeCircleIn">easeCircleIn</option>
            <option value="easeCircleOut">easeCircleOut</option>
            <option value="easeCircleInOut">easeCircleInOut</option>
            <option value="easeBackIn">easeBackIn</option>
            <option value="easeBackOut">easeBackOut</option>
            <option value="easeBackInOut">easeBackInOut</option>
            <option value="easeBounceIn">easeBounceIn</option>
            <option value="easeBounceOut">easeBounceOut</option>
            <option value="easeBounceInOut">easeBounceInOut</option>
            <option value="easeElasticIn">easeElasticIn</option>
            <option value="easeElasticOut">easeElasticOut</option>
            <option value="easeElasticInOut">easeElasticInOut</option>
          </select>
        </div>
      </div>

      <!-- Series tab -->
      <div class="tab-panel" id="tab-series" role="tabpanel">
        <div class="control-group">
          <label for="series-select">Active</label>
          <select id="series-select"><option value="default">default</option></select>
        </div>
        <button id="btn-add-series">Add series</button>
        <button id="btn-remove-series" class="danger">Remove series</button>
        <div class="vr"></div>
        <button id="btn-series-load">Load data</button>
        <div class="btn-group">
          <button id="btn-series-append">Append 1</button>
          <button id="btn-series-auto-append">Auto</button>
        </div>
        <button id="btn-load-multi">Load all (Record)</button>
        <div class="vr"></div>
        <div class="control-group">
          <label for="series-color">Color</label>
          <input type="color" id="series-color" value="#4f46e5" />
        </div>
        <div class="control-group">
          <label for="series-weight">Weight</label>
          <input type="number" id="series-weight" value="2" min="0.5" max="10" step="0.5" />
        </div>
        <div class="vr"></div>
        <span class="section-label">updateSeriesSettings</span>
        <div class="control-group">
          <label for="series-dot-radius">Dot radius</label>
          <input type="number" id="series-dot-radius" placeholder="default" min="0" max="20" step="0.5" style="width:80px" />
        </div>
        <div class="control-group">
          <label for="series-curve">Curve</label>
          <select id="series-curve">
            <option value="">default</option>
            <option value="linear">linear</option>
            <option value="monotoneX">monotoneX</option>
            <option value="monotoneY">monotoneY</option>
            <option value="natural">natural</option>
            <option value="basis">basis</option>
            <option value="cardinal">cardinal</option>
            <option value="catmullRom">catmullRom</option>
            <option value="step">step</option>
            <option value="stepBefore">stepBefore</option>
            <option value="stepAfter">stepAfter</option>
          </select>
        </div>
        <div class="control-group">
          <label for="series-smoothing">Smoothing</label>
          <input type="number" id="series-smoothing" placeholder="default" min="0" step="1" style="width:80px" />
        </div>
        <div class="control-group">
          <label for="series-decimation">Decimation</label>
          <input type="number" id="series-decimation" placeholder="default" min="0" step="1" style="width:80px" />
        </div>
        <div class="control-group">
          <label><input type="checkbox" id="series-show-labels" /> Labels</label>
        </div>
        <div class="control-group">
          <label for="series-dot-border">Dot border</label>
          <input type="color" id="series-dot-border" value="#ffffff" />
          <button id="btn-series-dot-border-clear">Clear</button>
        </div>
        <button id="btn-update-series-settings">Apply</button>
        <button id="btn-reset-series-settings" class="danger">Reset all</button>
      </div>

      <!-- Axes tab -->
      <div class="tab-panel" id="tab-axes" role="tabpanel">
        <div class="control-group">
          <label for="axis-select">Axis</label>
          <select id="axis-select"><option value="default">default</option></select>
        </div>
        <div class="control-group">
          <label for="axis-name">Name</label>
          <input type="text" id="axis-name" value="default" />
        </div>
        <div class="control-group">
          <label for="axis-color">Color</label>
          <input type="color" id="axis-color" value="#4f46e5" />
        </div>
        <div class="vr"></div>
        <div class="control-group">
          <label><input type="checkbox" id="axis-use-range" /> range</label>
          <input type="number" id="axis-range-min" placeholder="min" step="1" />
          <input type="number" id="axis-range-max" placeholder="max" step="1" />
        </div>
        <div class="control-group">
          <label><input type="checkbox" id="axis-use-limits" /> limits</label>
          <input type="number" id="axis-limits-min" placeholder="min" step="1" />
          <input type="number" id="axis-limits-max" placeholder="max" step="1" />
        </div>
        <div class="vr"></div>
        <button id="btn-create-axis">Create / Update axis</button>
        <button id="btn-remove-axis" class="danger">Remove axis</button>
        <button id="btn-associate-series">Associate active series</button>
        <div class="vr"></div>
        <span class="section-label">updateAxisSettings</span>
        <div class="control-group">
          <label for="axis-scale-type">Scale</label>
          <select id="axis-scale-type">
            <option value="">default</option>
            <option value="linear">linear</option>
            <option value="log">log</option>
          </select>
        </div>
        <div class="control-group">
          <label><input type="checkbox" id="axis-show-grid" checked /> Grid</label>
        </div>
        <div class="control-group">
          <label for="axis-grid-color">Grid color</label>
          <input type="color" id="axis-grid-color" value="#e5e7eb" />
        </div>
        <div class="control-group">
          <label for="axis-grid-opacity">Grid opacity</label>
          <input type="range" id="axis-grid-opacity" min="0" max="1" step="0.05" value="0.7" style="width:100px" />
          <span id="axis-grid-opacity-display" style="font-size:12px;color:#374151;min-width:28px">0.7</span>
        </div>
        <button id="btn-update-axis-settings">Apply axis settings</button>
        <button id="btn-reset-axis-settings" class="danger">Reset all</button>
      </div>

      <!-- Labels tab -->
      <div class="tab-panel" id="tab-labels" role="tabpanel">
        <div class="control-group">
          <label for="chart-title">Title</label>
          <input type="text" id="chart-title" placeholder="Chart title" style="width:160px" />
        </div>
        <div class="control-group">
          <label for="x-label">X axis</label>
          <input type="text" id="x-label" placeholder="X-axis label" />
        </div>
        <div class="control-group">
          <label for="y-label">Y axis</label>
          <input type="text" id="y-label" placeholder="Y-axis label" />
        </div>
      </div>

      <!-- Annotations tab -->
      <div class="tab-panel" id="tab-annotations" role="tabpanel">
        <div class="control-group">
          <label for="anno-name">Name</label>
          <input type="text" id="anno-name" value="anno-1" style="width:90px" />
        </div>
        <div class="control-group">
          <label for="anno-type">Type</label>
          <select id="anno-type">
            <option value="horizontal" selected>horizontal</option>
            <option value="vertical">vertical</option>
          </select>
        </div>
        <div class="control-group">
          <label for="anno-y">Y value</label>
          <input type="number" id="anno-y" placeholder="value" step="1" style="width:80px" />
        </div>
        <div class="control-group">
          <label for="anno-x">X (ISO date)</label>
          <input type="text" id="anno-x" placeholder="2024-02-01T00:00:00Z" style="width:170px" />
        </div>
        <div class="control-group">
          <label for="anno-axis">Axis</label>
          <select id="anno-axis"><option value="default">default</option></select>
        </div>
        <div class="control-group">
          <label for="anno-label">Label</label>
          <input type="text" id="anno-label" placeholder="hover tooltip text" style="width:160px" />
        </div>
        <div class="vr"></div>
        <div class="control-group">
          <label for="anno-color">Color</label>
          <input type="color" id="anno-color" value="#6366f1" />
        </div>
        <div class="control-group">
          <label for="anno-thickness">Thickness</label>
          <input type="number" id="anno-thickness" value="1.5" min="0.5" step="0.5" style="width:70px" />
        </div>
        <div class="control-group">
          <label><input type="checkbox" id="anno-dashed" checked /> Dashed</label>
        </div>
        <div class="vr"></div>
        <button id="btn-anno-add">Add / Update</button>
        <button id="btn-anno-remove" class="danger">Remove</button>
        <button id="btn-anno-clear" class="danger">Clear all</button>
      </div>
    </div>

    <div id="chart-container"></div>
    <div id="log">Loading data in 1.5s…</div>

    <script>
      // Tab switching
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const target = btn.dataset.tab
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
          document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'))
          btn.classList.add('active')
          document.getElementById('tab-' + target).classList.add('active')
        })
      })
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
