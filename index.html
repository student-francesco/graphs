<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LineChart Dev Harness</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #f9fafb; color: #111827; padding: 24px; }
      h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 16px; }
      .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
      button {
        padding: 6px 14px; border-radius: 6px; border: 1px solid #d1d5db;
        background: #fff; cursor: pointer; font-size: 13px;
      }
      button:hover { background: #f3f4f6; }
      #chart-container { width: 100%; height: 400px; background: #fff; border-radius: 10px; border: 1px solid #e5e7eb; }
      #log { margin-top: 16px; font-size: 12px; color: #6b7280; }
    </style>
  </head>
  <body>
    <h1>LineChart Dev Harness</h1>
    <div class="controls">
      <button id="btn-red">Red line</button>
      <button id="btn-blue">Blue line</button>
      <button id="btn-append">Append 1 point</button>
      <button id="btn-append-batch">Append 5 points</button>
      <button id="btn-update">Simulate live window</button>
      <button id="btn-clear">Clear</button>
      <button id="btn-reload">Reload data</button>
      <button id="btn-no-dots">Toggle dots</button>
      <button id="btn-toggle-grid">Toggle grid</button>
    </div>
    <div id="chart-container"></div>
    <div id="log">Loading data in 1.5s…</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
